<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Project</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="background-image">
      <div class="container">
        <div class="header">
          <div class="title">
            <h1>My Own Library</h1>
          </div>
        </div>
        <div class="main-content">
          <h2>List of Books</h2>
          <div class="bookshelf"></div>
        </div>
        <div class="registration">
          <button id="toggle-form" class="show">Add new book</button>
          <form action="" id="book-form" class="form-hidden">
            <label for="title">
              Book title:
              <input type="text" id="title" />
            </label>
            <button type="submit">Submit</button>
          </form>
        </div>
      </div>
      <span class="caption"
        >Photo by
        <a
          href="https://unsplash.com/@zetong?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Zetong Li</a
        >
        on
        <a
          href="https://unsplash.com/photos/a-long-row-of-books-in-a-library-hs9KUzMKNNg?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Unsplash</a
        >
      </span>
    </div>
  </body>
</html>
