<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Project</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="background-image">
      <div class="container">
        <div class="header">
          <div class="title">
            <h1>My Own Library</h1>
          </div>
        </div>
        <div class="main-content">
          <h2>List of Books</h2>
          <div class="bookshelf"></div>
        </div>
        <div class="registration">
          <button id="toggle-form" class="show">Add new book</button>
          <form action="" id="book-form" class="form-hidden">
            <label for="title">
              Book title:
              <input
                type="text"
                id="title"
                name="title"
                placeholder="Enter the book title"
                minlength="3"
                required
              />
            </label>
            <label for="author">
              Book author:
              <input
                type="text"
                id="author"
                name="author"
                placeholder="Enter the book author"
                minlength="3"
              />
            </label>
            <label for="pages">
              Total pages:
              <input
                type="text"
                id="pages"
                name="pages"
                placeholder="For example: 300"
                pattern="^[0-9]+$"
              />
            </label>
            <div class="read-status">
              <div>Have you read it?</div>
              <div class="radio-options">
                <div>
                  <input
                    type="radio"
                    id="read"
                    name="isRead"
                    value="true"
                    required
                  />
                  <label for="read">Yes</label>
                </div>
                <div>
                  <input
                    type="radio"
                    id="not-read"
                    name="isRead"
                    value="false"
                    required
                  />
                  <label for="">No</label>
                </div>
              </div>
            </div>
            <button type="submit" id="submit-book">Submit</button>
          </form>
        </div>
      </div>
      <span class="caption"
        >Photo by
        <a
          href="https://unsplash.com/@zetong?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Zetong Li</a
        >
        on
        <a
          href="https://unsplash.com/photos/a-long-row-of-books-in-a-library-hs9KUzMKNNg?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Unsplash</a
        >
      </span>
    </div>
  </body>
</html>
